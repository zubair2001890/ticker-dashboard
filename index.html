<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticker Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1c25; --border: rgba(255,255,255,0.08);
  --text: #e0e0e0; --text-muted: rgba(255,255,255,0.45);
  --accent: #6366f1; --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Layout */
.container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

/* Ticker Input */
.search-wrapper { display: flex; justify-content: center; margin-bottom: 32px; }
.search-box {
  background: var(--surface); border: 2px solid rgba(99,102,241,0.3); border-radius: 14px;
  padding: 14px 24px; font-size: 1.6rem; font-weight: 700; color: var(--text);
  text-align: center; width: 200px; letter-spacing: 0.08em; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box::placeholder { color: var(--text-muted); font-weight: 400; letter-spacing: 0; font-size: 1rem; }
.search-box:focus { border-color: rgba(99,102,241,0.8); box-shadow: 0 0 0 4px rgba(99,102,241,0.15); }

/* Header */
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
.company-name { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
.company-meta { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
.price-block { text-align: right; }
.price-big { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; }
.price-change { font-weight: 600; font-size: 1.1rem; }
.price-up { color: var(--green); }
.price-down { color: var(--red); }

/* Section Headers */
.section-header {
  font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em;
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 2px solid rgba(99,102,241,0.3); display: inline-block;
}

/* Metric Grid */
.metrics-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 12px; }
@media (max-width: 900px) { .metrics-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 550px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
.metric-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px;
  transition: transform 0.2s, border-color 0.2s;
}
.metric-card:hover { transform: translateY(-2px); border-color: rgba(99,102,241,0.4); }
.metric-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; }
.metric-value { font-size: 1.25rem; font-weight: 600; }

/* Charts */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
@media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
.chart-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px;
}

/* Cash Flow Row */
.cf-row { display: grid; grid-template-columns: 3fr 2fr; gap: 20px; margin-bottom: 28px; }
@media (max-width: 900px) { .cf-row { grid-template-columns: 1fr; } }
.cf-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
.cf-table th { text-align: left; padding: 10px 12px; color: var(--text-muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
.cf-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.cf-table tr:hover td { background: rgba(255,255,255,0.02); }

/* Balance Sheet */
.bs-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
@media (max-width: 900px) { .bs-grid { grid-template-columns: repeat(3, 1fr); } }

/* 52-Week & Analyst Row */
.bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
@media (max-width: 900px) { .bottom-row { grid-template-columns: 1fr; } }
.range-bar-track { height: 8px; border-radius: 4px; background: linear-gradient(90deg, var(--red), var(--yellow), var(--green)); position: relative; margin: 10px 0; }
.range-marker { position: absolute; width: 3px; height: 20px; background: white; border-radius: 2px; top: -6px; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
.range-labels { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); }
.range-current { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

/* Analyst Pills */
.pill { display: inline-block; padding: 5px 16px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; }
.pill-buy { background: rgba(16,185,129,0.15); color: var(--green); }
.pill-hold { background: rgba(245,158,11,0.15); color: var(--yellow); }
.pill-sell { background: rgba(239,68,68,0.15); color: var(--red); }
.analyst-detail { margin-top: 12px; font-size: 0.9rem; }
.analyst-sub { opacity: 0.5; font-size: 0.8rem; margin-top: 2px; }

/* About */
.about-toggle { cursor: pointer; color: var(--accent); font-size: 0.9rem; font-weight: 500; margin-top: 8px; }
.about-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-top: 10px; display: none; }

/* Loading */
.loading { text-align: center; padding: 80px 0; color: var(--text-muted); font-size: 1.1rem; }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 12px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { text-align: center; padding: 40px; color: var(--red); }

.spacer { height: 24px; }
.spacer-sm { height: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="search-wrapper">
    <input class="search-box" id="tickerInput" placeholder="AAPL" value="AAPL" maxlength="6" spellcheck="false" autocomplete="off">
  </div>
  <div id="content"><div class="loading"><span class="spinner"></span>Loading...</div></div>
</div>

<script>
const PROXY = "https://corsproxy.io/?";
const YF_BASE = "https://query2.finance.yahoo.com";

function fmt(val, prefix = "$", decimals = 2) {
  if (val == null || isNaN(val)) return "N/A";
  const abs = Math.abs(val);
  if (abs >= 1e12) return `${prefix}${(val/1e12).toFixed(decimals)}T`;
  if (abs >= 1e9) return `${prefix}${(val/1e9).toFixed(decimals)}B`;
  if (abs >= 1e6) return `${prefix}${(val/1e6).toFixed(decimals)}M`;
  return `${prefix}${val.toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals})}`;
}

function pct(val) {
  if (val == null || isNaN(val)) return "N/A";
  return (val * 100).toFixed(1) + "%";
}

function num(val, d = 2) {
  if (val == null || isNaN(val)) return "N/A";
  return val.toFixed(d);
}

function metricCard(label, value) {
  return `<div class="metric-card"><div class="metric-label">${label}</div><div class="metric-value">${value}</div></div>`;
}

async function fetchYF(symbol) {
  const modules = "price,summaryDetail,defaultKeyStatistics,financialData,incomeStatementHistory,balanceSheetHistory,cashflowStatementHistory,recommendationTrend";
  const url = `${PROXY}${encodeURIComponent(`${YF_BASE}/v10/finance/quoteSummary/${symbol}?modules=${modules}`)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.quoteSummary?.error) throw new Error(json.quoteSummary.error.description || "Unknown error");
  return json.quoteSummary.result[0];
}

async function fetchChart(symbol) {
  const url = `${PROXY}${encodeURIComponent(`${YF_BASE}/v8/finance/chart/${symbol}?range=1y&interval=1d`)}`;
  const res = await fetch(url);
  const json = await res.json();
  return json.chart.result[0];
}

function rv(obj) { return obj?.raw ?? obj ?? null; }

function buildDashboard(data, chart) {
  const p = data.price || {};
  const sd = data.summaryDetail || {};
  const ks = data.defaultKeyStatistics || {};
  const fd = data.financialData || {};
  const inc = data.incomeStatementHistory?.incomeStatementHistory || [];
  const bs = data.balanceSheetHistory?.balanceSheetHistory || [];
  const cf = data.cashflowStatementHistory?.cashflowStatements || [];
  const rec = data.recommendationTrend?.trend || [];

  const price = rv(p.regularMarketPrice);
  const prevClose = rv(p.regularMarketPreviousClose);
  const change = rv(p.regularMarketChange);
  const changePct = rv(p.regularMarketChangePercent);
  const name = p.longName || p.shortName || "";
  const exchange = p.exchangeName || "";

  let html = "";

  // Header
  const changeClass = change >= 0 ? "price-up" : "price-down";
  const arrow = change >= 0 ? "+" : "";
  html += `<div class="header">
    <div>
      <div class="company-name">${name}</div>
      <div class="company-meta">${[exchange, rv(sd.sector), rv(sd.industry)].filter(Boolean).join(" &middot; ") || ""}</div>
    </div>
    <div class="price-block">
      <div class="price-big">$${price != null ? price.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) : "N/A"}</div>
      ${change != null ? `<div class="price-change ${changeClass}">${arrow}${change.toFixed(2)} (${arrow}${(changePct*100).toFixed(2)}%)</div>` : ""}
    </div>
  </div>`;

  // Valuation
  html += `<div class="section-header">Valuation</div>
  <div class="metrics-grid">
    ${metricCard("Market Cap", fmt(rv(p.marketCap)))}
    ${metricCard("P/E (TTM)", num(rv(sd.trailingPE), 1))}
    ${metricCard("Fwd P/E", num(rv(sd.forwardPE), 1))}
    ${metricCard("PEG Ratio", num(rv(ks.pegRatio), 2))}
    ${metricCard("EV/EBITDA", num(rv(ks.enterpriseToEbitda), 1))}
    ${metricCard("P/S (TTM)", num(rv(ks.priceToSalesTrailing12Months) || rv(sd.priceToSalesTrailing12Months), 1))}
  </div><div class="spacer-sm"></div>`;

  // Profitability
  html += `<div class="section-header">Profitability</div>
  <div class="metrics-grid">
    ${metricCard("Revenue (TTM)", fmt(rv(fd.totalRevenue)))}
    ${metricCard("Gross Margin", pct(rv(fd.grossMargins)))}
    ${metricCard("Op Margin", pct(rv(fd.operatingMargins)))}
    ${metricCard("Net Margin", pct(rv(fd.profitMargins)))}
    ${metricCard("ROE", pct(rv(fd.returnOnEquity)))}
    ${metricCard("EPS (TTM)", rv(ks.trailingEps) != null ? "$" + rv(ks.trailingEps).toFixed(2) : "N/A")}
  </div><div class="spacer-sm"></div>`;

  // Financial Health
  html += `<div class="section-header">Financial Health</div>
  <div class="metrics-grid">
    ${metricCard("Debt/Equity", num(rv(fd.debtToEquity), 0))}
    ${metricCard("Current Ratio", num(rv(fd.currentRatio), 2))}
    ${metricCard("Quick Ratio", num(rv(fd.quickRatio), 2))}
    ${metricCard("Beta", num(rv(ks.beta), 2))}
    ${metricCard("Div Yield", rv(sd.dividendYield) != null ? pct(rv(sd.dividendYield)) : "N/A")}
    ${metricCard("Payout Ratio", rv(sd.payoutRatio) != null ? pct(rv(sd.payoutRatio)) : "N/A")}
  </div><div class="spacer"></div>`;

  // Charts
  html += `<div class="charts-row">
    <div class="chart-card"><div class="section-header">1Y Price Action</div><div id="priceChart"></div></div>
    <div class="chart-card"><div class="section-header">Revenue vs Net Income</div><div id="revenueChart"></div></div>
  </div>`;

  // Cash Flow
  html += `<div class="cf-row">
    <div class="chart-card"><div class="section-header">Cash Flow Trend</div><div id="cfChart"></div></div>
    <div class="chart-card"><div class="section-header">Cash Flow Table</div><div id="cfTable"></div></div>
  </div>`;

  // Balance Sheet
  if (bs.length > 0) {
    const latest = bs[0];
    html += `<div class="section-header">Balance Sheet (Latest)</div>
    <div class="bs-grid">
      ${metricCard("Total Assets", fmt(rv(latest.totalAssets)))}
      ${metricCard("Total Liabilities", fmt(rv(latest.totalLiab)))}
      ${metricCard("Equity", fmt(rv(latest.totalStockholderEquity)))}
      ${metricCard("Cash", fmt(rv(latest.cash)))}
      ${metricCard("Total Debt", fmt(rv(latest.longTermDebt) || rv(latest.totalDebt)))}
    </div><div class="spacer"></div>`;
  }

  // 52-Week & Analyst
  const low52 = rv(sd.fiftyTwoWeekLow);
  const high52 = rv(sd.fiftyTwoWeekHigh);
  const recKey = fd.recommendationKey;
  const targetMean = rv(fd.targetMeanPrice);
  const targetLow = rv(fd.targetLowPrice);
  const targetHigh = rv(fd.targetHighPrice);
  const numAnalysts = rv(fd.numberOfAnalystOpinions);

  html += `<div class="bottom-row">`;

  // 52-week range
  if (low52 && high52 && price) {
    const rangePct = ((price - low52) / (high52 - low52)) * 100;
    const clamped = Math.min(Math.max(rangePct, 0), 100);
    html += `<div class="chart-card">
      <div class="section-header">52-Week Range</div>
      <div style="padding:10px 0">
        <div class="range-labels"><span>$${low52.toFixed(2)}</span><span>$${high52.toFixed(2)}</span></div>
        <div class="range-bar-track"><div class="range-marker" style="left:${clamped}%"></div></div>
        <div class="range-current">Current: $${price.toFixed(2)} (${rangePct.toFixed(0)}% of range)</div>
      </div>
    </div>`;
  } else {
    html += `<div class="chart-card"><div class="section-header">52-Week Range</div><div style="color:var(--text-muted)">N/A</div></div>`;
  }

  // Analyst
  html += `<div class="chart-card"><div class="section-header">Analyst Consensus</div>`;
  if (recKey) {
    const pillClass = ["buy","strong_buy"].includes(recKey) ? "pill-buy" : ["sell","strong_sell"].includes(recKey) ? "pill-sell" : "pill-hold";
    const recDisplay = recKey.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    const upside = targetMean && price ? (((targetMean / price) - 1) * 100) : null;
    html += `<span class="pill ${pillClass}">${recDisplay}</span>`;
    if (targetMean) {
      html += `<div class="analyst-detail">Target: <b>$${targetMean.toFixed(2)}</b>${upside != null ? ` (${upside >= 0 ? "+" : ""}${upside.toFixed(1)}%)` : ""}</div>`;
      html += `<div class="analyst-sub">Range: $${targetLow?.toFixed(2) || "?"} – $${targetHigh?.toFixed(2) || "?"} &middot; ${numAnalysts || "?"} analysts</div>`;
    }
  } else {
    html += `<div style="color:var(--text-muted)">No analyst data available</div>`;
  }
  html += `</div></div>`;

  // About
  const desc = p.longBusinessSummary || sd.longBusinessSummary;
  if (desc) {
    html += `<div class="about-toggle" onclick="const t=this.nextElementSibling;t.style.display=t.style.display==='block'?'none':'block'">About ${name} ▾</div>
    <div class="about-text">${desc}</div>`;
  }

  document.getElementById("content").innerHTML = html;

  // Render charts
  renderPriceChart(chart);
  renderRevenueChart(inc);
  renderCashFlowChart(cf);
  renderCFTable(cf);
}

function renderPriceChart(chart) {
  if (!chart) return;
  const ts = chart.timestamp.map(t => new Date(t * 1000));
  const q = chart.indicators.quote[0];

  Plotly.newPlot("priceChart", [{
    type: "candlestick", x: ts,
    open: q.open, high: q.high, low: q.low, close: q.close,
    increasing: { line: { color: "#10b981" }, fillcolor: "#10b981" },
    decreasing: { line: { color: "#ef4444" }, fillcolor: "#ef4444" },
  }], {
    height: 380,
    paper_bgcolor: "transparent", plot_bgcolor: "transparent",
    font: { family: "Inter", color: "rgba(255,255,255,0.6)", size: 11 },
    margin: { l: 50, r: 10, t: 10, b: 30 },
    xaxis: { showgrid: false, rangeslider: { visible: false } },
    yaxis: { gridcolor: "rgba(255,255,255,0.04)" },
  }, { responsive: true, displayModeBar: false });
}

function renderRevenueChart(inc) {
  if (!inc.length) { document.getElementById("revenueChart").innerHTML = '<div style="color:var(--text-muted);padding:40px">No data</div>'; return; }
  const sorted = [...inc].reverse();
  const years = sorted.map(s => new Date(rv(s.endDate) * 1000).getFullYear().toString());
  const rev = sorted.map(s => rv(s.totalRevenue));
  const ni = sorted.map(s => rv(s.netIncome));

  Plotly.newPlot("revenueChart", [
    { type: "bar", x: years, y: rev, name: "Revenue", marker: { color: "#6366f1", cornerradius: 6 } },
    { type: "bar", x: years, y: ni, name: "Net Income", marker: { color: ni.map(v => v >= 0 ? "#10b981" : "#ef4444"), cornerradius: 6 } },
  ], {
    height: 380, barmode: "group", bargap: 0.3,
    paper_bgcolor: "transparent", plot_bgcolor: "transparent",
    font: { family: "Inter", color: "rgba(255,255,255,0.6)", size: 11 },
    margin: { l: 60, r: 10, t: 10, b: 30 },
    xaxis: { showgrid: false },
    yaxis: { gridcolor: "rgba(255,255,255,0.04)" },
    legend: { orientation: "h", y: 1.08, x: 1, xanchor: "right", bgcolor: "transparent", font: { size: 11 } },
  }, { responsive: true, displayModeBar: false });
}

function renderCashFlowChart(cf) {
  if (!cf.length) { document.getElementById("cfChart").innerHTML = '<div style="color:var(--text-muted);padding:40px">No data</div>'; return; }
  const sorted = [...cf].reverse();
  const years = sorted.map(s => new Date(rv(s.endDate) * 1000).getFullYear().toString());
  const ocf = sorted.map(s => rv(s.totalCashFromOperatingActivities));
  const capex = sorted.map(s => rv(s.capitalExpenditures));
  const fcf = ocf.map((o, i) => (o != null && capex[i] != null) ? o + capex[i] : null);

  const traces = [
    { type: "bar", x: years, y: ocf, name: "Operating CF", marker: { color: "rgba(99,102,241,0.7)", cornerradius: 6 } },
    { type: "bar", x: years, y: capex, name: "CapEx", marker: { color: "rgba(239,68,68,0.7)", cornerradius: 6 } },
    { type: "scatter", x: years, y: fcf, name: "Free CF", mode: "lines+markers", line: { color: "#10b981", width: 3 }, marker: { size: 8, color: "#10b981" } },
  ];

  Plotly.newPlot("cfChart", traces, {
    height: 320, barmode: "group", bargap: 0.3,
    paper_bgcolor: "transparent", plot_bgcolor: "transparent",
    font: { family: "Inter", color: "rgba(255,255,255,0.6)", size: 11 },
    margin: { l: 60, r: 10, t: 10, b: 30 },
    xaxis: { showgrid: false },
    yaxis: { gridcolor: "rgba(255,255,255,0.04)" },
    legend: { orientation: "h", y: 1.12, x: 1, xanchor: "right", bgcolor: "transparent", font: { size: 11 } },
  }, { responsive: true, displayModeBar: false });
}

function renderCFTable(cf) {
  if (!cf.length) { document.getElementById("cfTable").innerHTML = '<div style="color:var(--text-muted);padding:40px">No data</div>'; return; }
  const sorted = [...cf].reverse();
  let html = `<table class="cf-table"><thead><tr><th>Year</th><th>Operating CF</th><th>CapEx</th><th>Free CF</th></tr></thead><tbody>`;
  sorted.forEach(s => {
    const year = new Date(rv(s.endDate) * 1000).getFullYear();
    const ocf = rv(s.totalCashFromOperatingActivities);
    const capex = rv(s.capitalExpenditures);
    const fcf = (ocf != null && capex != null) ? ocf + capex : null;
    html += `<tr><td>${year}</td><td>${fmt(ocf)}</td><td>${fmt(capex)}</td><td>${fmt(fcf)}</td></tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById("cfTable").innerHTML = html;
}

// --- Init ---
let debounceTimer;
const input = document.getElementById("tickerInput");

async function loadTicker(symbol) {
  if (!symbol) return;
  document.getElementById("content").innerHTML = '<div class="loading"><span class="spinner"></span>Loading...</div>';
  try {
    const [data, chart] = await Promise.all([fetchYF(symbol), fetchChart(symbol)]);
    buildDashboard(data, chart);
    document.title = `${symbol} — Ticker Dashboard`;
  } catch (e) {
    document.getElementById("content").innerHTML = `<div class="error">Could not load data for <b>${symbol}</b><br><span style="font-size:0.85rem;opacity:0.6">${e.message}</span></div>`;
  }
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    clearTimeout(debounceTimer);
    loadTicker(input.value.trim().toUpperCase());
  }
});

input.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const val = input.value.trim().toUpperCase();
    if (val.length >= 1) loadTicker(val);
  }, 800);
});

// Load default
loadTicker("AAPL");
</script>
</body>
</html>
